version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rag_llm_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-fieldforce}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: rag_llm_api
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-fieldforce}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_to_a_long_random_secret}
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rag_network
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: rag_llm_web
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - rag_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  rag_network:
    driver: bridge
